server:
  http_addr: ":8080"
  grpc_addr: ":9090"
  boot_http_addr: ":8082"
  # Restrict the boot service to one network interface (its IPv4 address is
  # used as the listen host). Empty = listen on all interfaces.
  # boot_http_interface: "eth1"
  # URL booting machines use to reach this host (DHCP options / iPXE scripts).
  external_boot_url: "http://192.168.90.1:8082"

database:
  dsn: "postgres://netboot:netboot-dev@localhost:5433/netboot?sslmode=disable"

valkey:
  # Standalone: a single endpoint.
  addr: "localhost:6380"
  # Cluster: list seed nodes instead (cluster mode is auto-detected). Listing
  # several tolerates a seed being down at startup. Use either addr or addrs.
  # addrs:
  #   - "10.0.0.1:6379"
  #   - "10.0.0.2:6379"
  #   - "10.0.0.3:6379"
  # username: ""   # for ACL auth
  # password: ""

artifacts:
  root: "./data/artifacts"
  max_upload_bytes: 4294967296

netboot:
  # DHCP binds directly to this interface at the socket level.
  dhcp_interface: "eth1"
  dhcp_addr: ":6767"
  tftp_addr: ":6969"
  # Restrict TFTP to one network interface (its IPv4 address is used as the
  # listen host). Empty = listen on all interfaces.
  # tftp_interface: "eth1"
  stale_session_timeout: "60m"
  seed_token_ttl: "30m"
  lease_ttl: "1h"

events:
  retention_days: 90

boot_files:
  # Auto-fetch missing kernel/initrd from the Ubuntu live-server ISO once at
  # startup (only casper/vmlinuz + casper/initrd are read via HTTP range
  # requests, not the full ISO). Fetched files are stored as artifacts and
  # reused, so later starts are no-ops. Leave off to upload boot files manually.
  auto_fetch: true
  # Serve the installer root filesystem so live-server installs work on
  # networks without local media. Two mutually-exclusive delivery methods:
  #
  #   serve_iso: casper downloads the whole ISO into RAM (url=). Simple, but the
  #     target VM needs ~12-16 GB RAM or cloud-init gets OOM-killed and the
  #     install drops to the interactive prompt.
  #
  #   nfs_root: the daemon loop-mounts the ISO and exports it over NFS; casper
  #     mounts the squashfs live (paged) via netboot=nfs. Low memory — 4 GB
  #     targets install fine. Requires netbootd to run as root with CAP_SYS_ADMIN
  #     to loop-mount (the shipped systemd unit grants it). Takes precedence over
  #     serve_iso when both are set.
  serve_iso: false
  nfs_root: true
  # NFS listen address (default :2049). Reachable from the provisioning segment.
  # nfs_addr: ":2049"
  # Releases to ensure (defaults to noble + jammy when omitted).
  releases: ["noble"]
  # Optional per-release ISO override for mirrors / air-gapped networks:
  # iso_urls:
  #   noble: "http://mirror.local/ubuntu-24.04-live-server-amd64.iso"

# Created on first start if no operator exists. Change the password immediately.
bootstrap_operator:
  username: "admin"
  password: "change-me-please"
