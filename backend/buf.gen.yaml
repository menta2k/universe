version: v2
inputs:
  - directory: api
plugins:
  - local: ["go", "run", "google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.5"]
    out: api
    opt: paths=source_relative
  - local: ["go", "run", "google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1"]
    out: api
    opt: paths=source_relative
  # Installed via: go install github.com/go-kratos/kratos/cmd/protoc-gen-go-http/v2
  # (from a checkout of the kratos repo at the version pinned in go.mod)
  - local: protoc-gen-go-http
    out: api
    opt: paths=source_relative
