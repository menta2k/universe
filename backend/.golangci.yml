run:
  timeout: 5m
  build-tags:
    - integration

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gosec
    - revive

linters-settings:
  gosec:
    excludes:
      - G404 # non-crypto rand is flagged where used deliberately

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
