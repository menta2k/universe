syntax = "proto3";

package netboot.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "netboot/v1/common.proto";

option go_package = "universe/backend/api/netboot/v1;netbootv1";

// Upload/Replace are handled outside proto as multipart HTTP endpoints
// (POST /api/v1/artifacts, PUT /api/v1/artifacts/{id}); listing, metadata
// and deletion are proto-defined.
service ArtifactService {
  rpc ListArtifacts(PageRequest) returns (ListArtifactsReply) {
    option (google.api.http) = {get: "/api/v1/artifacts"};
  }
  // Literal-path route before /{id} so "transfers" is not parsed as an id.
  rpc ListTransfers(ListTransfersRequest) returns (ListTransfersReply) {
    option (google.api.http) = {get: "/api/v1/artifacts/transfers"};
  }
  rpc GetArtifact(GetArtifactRequest) returns (BootArtifact) {
    option (google.api.http) = {get: "/api/v1/artifacts/{id}"};
  }
  rpc DeleteArtifact(GetArtifactRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/artifacts/{id}"};
  }
}

message BootArtifact {
  string id = 1;
  string kind = 2;           // kernel | initrd | ipxe_bin | other
  string ubuntu_release = 3; // jammy | noble | empty
  string filename = 4;
  int64 size_bytes = 5;
  string sha256 = 6;
  string uploaded_by = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message GetArtifactRequest {
  string id = 1;
}

message ListArtifactsReply {
  repeated BootArtifact artifacts = 1;
  PageMeta meta = 2;
}

message ListTransfersRequest {
  PageRequest page = 1;
  string filename = 2;
}

message Transfer {
  google.protobuf.Timestamp time = 1;
  string client_ip = 2;
  string filename = 3;
  int64 bytes_sent = 4;
  bool success = 5;
  string error = 6;
  string protocol = 7; // tftp | http
}

message ListTransfersReply {
  repeated Transfer transfers = 1;
  PageMeta meta = 2;
}
