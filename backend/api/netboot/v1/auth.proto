syntax = "proto3";

package netboot.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/menta2k/universe/backend/api/netboot/v1;netbootv1";

service AuthService {
  rpc Login(LoginRequest) returns (Operator) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }
  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout"
      body: "*"
    };
  }
  rpc Me(google.protobuf.Empty) returns (Operator) {
    option (google.api.http) = {
      get: "/api/v1/auth/me"
    };
  }
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message Operator {
  string id = 1;
  string username = 2;
  string display_name = 3;
  bool active = 4;
}
