name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.24", cache-dependency-path: backend/go.sum }
      - name: Verify generated code is up to date
        run: |
          git clone --depth 1 --branch v2.9.2 https://github.com/go-kratos/kratos /tmp/kratos
          (cd /tmp/kratos/cmd/protoc-gen-go-http && go install .)
          go run github.com/bufbuild/buf/cmd/buf@v1.50.0 generate
          git diff --exit-code -- api/
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with: { working-directory: backend }
      - name: Test with coverage gate
        run: make test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      timescaledb:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_DB: netboot
          POSTGRES_USER: netboot
          POSTGRES_PASSWORD: netboot-dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U netboot" --health-interval 5s
          --health-timeout 3s --health-retries 10
      valkey:
        image: valkey/valkey:8.0
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.24", cache-dependency-path: backend/go.sum }
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Start backend
        working-directory: backend
        run: |
          go run ./cmd/netbootd migrate -conf configs/netbootd.ci.yaml
          go run ./cmd/netbootd -conf configs/netbootd.ci.yaml &
          for i in $(seq 1 30); do curl -sf localhost:8080/healthz && break; sleep 1; done
      - name: Playwright E2E
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: frontend/playwright-report/ }
