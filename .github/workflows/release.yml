# Release — runs on a `v*` tag push (e.g. `git tag v0.1.0 && git push --tags`).
#
# Mirrors the menta2k/iris release workflow: one combined image (the Go
# backend with the Vue SPA and DB migrations embedded, built by
# deploy/Dockerfile) is pushed to GHCR, deb/rpm packages are built from the
# same binary, then a GitHub Release is created and old artefacts are pruned.
# GHCR auths with the automatic GITHUB_TOKEN — no PAT needed.

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # softprops/action-gh-release
  packages: write # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the Dockerfile pulls from both backend/ and
          # frontend/ and embeds the built SPA into the binary.
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64
          push: true
          # No provenance/SBOM attestation: keep exactly one GHCR package version
          # per release (all semver tags point to the same digest) so the cleanup
          # job's "keep last 5" maps cleanly to the last 5 releases.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  packages:
    name: deb + rpm (nfpm)
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract the netbootd binary from the release image
        # Reuse the exact binary the docker job just built+pushed (web UI and
        # migrations embedded) rather than rebuilding — guarantees the package
        # binary is byte-identical to the image. The semver {{version}} tag for
        # v0.1.0 is "0.1.0", i.e. the ref name with the leading "v" stripped.
        run: |
          set -eux
          tag="${GITHUB_REF_NAME#v}"
          image="${REGISTRY}/${{ steps.img.outputs.name }}:${tag}"
          docker pull "$image"
          cid=$(docker create "$image")
          mkdir -p deploy/nfpm/pkg-staging
          docker cp "${cid}:/usr/local/bin/netbootd" deploy/nfpm/pkg-staging/netbootd
          docker rm "$cid"
          test -x deploy/nfpm/pkg-staging/netbootd

      - name: Install nfpm
        # No first-party setup action exists; the goreleaser team ship the
        # binary on releases. Pinned so package layouts stay stable across
        # releases (postinst conventions occasionally drift between majors).
        env:
          NFPM_VERSION: '2.41.3'
        run: |
          set -eux
          curl -fsSL -o /tmp/nfpm.tar.gz \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Build deb + rpm
        run: |
          set -eux
          export VERSION="${GITHUB_REF_NAME#v}"   # v0.1.0 → 0.1.0
          mkdir -p deploy/nfpm/out
          cd deploy/nfpm
          nfpm package -p deb -f nfpm.yaml -t out/
          nfpm package -p rpm -f nfpm.yaml -t out/
          ls -lh out/

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: netbootd-packages
          path: deploy/nfpm/out/*
          retention-days: 30

  release:
    name: GitHub Release
    needs: [docker, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download deb + rpm
        uses: actions/download-artifact@v4
        with:
          name: netbootd-packages
          path: ./dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
          body: |
            Container image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            Single image serving the admin API + embedded web UI on :8080
            (gRPC :9090) plus the machine-facing DHCP/TFTP/boot-HTTP services.
            Database migrations are embedded — apply with `netbootd migrate`.

            ## Bare-metal packages

            `.deb` (Debian/Ubuntu) and `.rpm` (RHEL/Rocky/Alma) are attached
            below. They install the `netbootd` binary to `/usr/local/bin`, a
            systemd unit, and config under `/etc/netbootd`. After install,
            edit `/etc/netbootd/netbootd.yaml`, run
            `netbootd migrate -conf /etc/netbootd/netbootd.yaml`, then
            `systemctl enable --now netbootd`.

  cleanup:
    name: Prune old images + releases
    needs: [docker, packages, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write # delete old GitHub Releases
      packages: write # delete old GHCR versions
    steps:
      - name: Prune GHCR image versions (keep last 5 releases)
        # dataaxiom handles pagination robustly (actions/delete-package-versions
        # 404s when pruning a large backlog). keep-n-tagged counts image versions,
        # and with provenance disabled each release is one multi-tagged version —
        # so 5 = the last 5 releases. Untagged/partial cruft is swept too.
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: ${{ github.event.repository.name }}
          keep-n-tagged: 5
          delete-untagged: true
          delete-partial-images: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune GitHub Releases (keep last 5)
        # Independent of the image prune (if: always) so a registry hiccup can't
        # block it. Removes older Release objects only; git tags are preserved so
        # the version history and any tag-pinned deployments stay intact.
        if: always()
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
