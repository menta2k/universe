# nfpm spec for the netbootd deb/rpm packages built by the release workflow.
# VERSION is injected by the workflow (tag with the leading "v" stripped);
# the binary is staged into pkg-staging/ from the just-built release image so
# packages ship the exact bits of the container (web UI + migrations embedded).
name: netbootd
arch: amd64
platform: linux
version: ${VERSION}
section: admin
priority: optional
maintainer: Veselin Iordanov <veselin.iordanov@gmail.com>
description: |
  Netboot Manager — unattended Ubuntu network installs.
  Single binary serving the admin API + embedded web UI (:8080), gRPC (:9090),
  and the machine-facing DHCP, TFTP and boot-HTTP services. Database
  migrations are embedded and applied with `netbootd migrate`.
homepage: https://github.com/menta2k/universe

contents:
  - src: pkg-staging/netbootd
    dst: /usr/local/bin/netbootd
    file_info:
      mode: 0755
  - src: netbootd.service
    dst: /lib/systemd/system/netbootd.service
  - src: ../../backend/configs/netbootd.example.yaml
    dst: /etc/netbootd/netbootd.yaml
    type: config|noreplace

scripts:
  postinstall: scripts/postinstall.sh
